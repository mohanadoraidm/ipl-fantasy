<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Fantasy 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-status-bar" content="#0f172a">
    <style>
        :root { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; --accent: #38bdf8; --card: #1e293b; }
        body { margin: 0; padding: 4px; /* Slashed body padding */ }
        .container { max-width: 600px; margin: auto; }
        .btn { background: var(--accent); color: #0f172a; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; }
        
        /* HOME PAGE COMPACTNESS */
        .toggle-container { display: flex; background: #1e293b; border-radius: 6px; padding: 2px; margin-bottom: 8px; border: 1px solid #334155; }
        .toggle-btn { flex: 1; padding: 6px; text-align: center; font-size: 0.75rem; font-weight: bold; color: #94a3b8; border-radius: 4px; }
        .toggle-btn.active { background: var(--accent); color: #0f172a; }
        
        /* 1-COLUMN VERTICAL LIST */
        #team-list { display: flex; flex-direction: column; gap: 4px; } 
        
        .team-card { 
            background: var(--card); border: 1px solid #334155; 
            padding: 6px 12px; border-radius: 6px; 
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer;
        }
        
        .logo { 
            width: 28px; height: 28px; 
            border-radius: 50%; object-fit: cover; 
            margin-right: 12px; background: #0f172a;
        }
        /* TEAM PAGE COMPACTNESS */
        #player-pool { display: flex; flex-direction: column; gap: 1px; width: 100%; }
        
        /* Ultra-tight rows (26px height) */
        .player-row { display: flex; align-items: center; padding: 0 4px; background: #1e293b; border-radius: 4px; font-size: 0.75rem; height: 26px; border: 1px solid #334155; }
        
        /* Full names stay on one line */
        .player-name { margin-left: 6px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-size: 0.75rem;}
        
        .role-badge { font-size: 0.55rem; padding: 2px 4px; margin-left: 4px; border-radius: 3px; }
        .pts-val { margin-left: 6px; font-weight: bold; font-size: 0.8rem; color: #ffb7b2; }
        .playing-today-dot { height: 6px; width: 6px; background-color: #10b981; border-radius: 50%; box-shadow: 0 0 6px #10b981; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
    </style>
</head>
<body>
    <div class="container">
        <div id="home-page">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <h2 style="margin: 0; font-size: 1.2rem;">IPL FANTASY</h2>
                <button onclick="triggerScraper(this)" style="background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold;">🔄 REFRESH</button>
            </header>
            
            <div id="prediction-container"></div>
            <div id="toggle-container"></div>
            <div id="team-list"></div>
        </div>

        <div id="selection-page" style="display:none;">
            <div class="stats-bar" style="display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 6px 8px; border-radius: 6px; border: 1px solid var(--accent); margin-bottom: 4px;">
                <span style="font-size: 0.75rem;">Sel: <b id="count">0</b>/11 | Frg: <b id="frgn">0</b>/4 | Ov: <b id="overs">0</b> | Today: <b function updateStats(players)id="today-count">0</b></span>
                <button onclick="autoSelectSquad()" style="background: #10b981; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold;">⚡ AUTO</button>
            </div>
            
            <div id="player-pool"></div>
            
            <div style="display: flex; gap: 8px; margin-top: 6px;">
                <button class="btn" style="flex: 1; margin: 0; padding: 8px; font-size: 0.8rem;" onclick="saveSelection(this)">SAVE SQUAD</button>
                <button class="btn btn-secondary" style="flex: 1; margin: 0; padding: 8px; font-size: 0.8rem; background: #475569;" onclick="closeSelection()">CANCEL</button>
            </div>
        </div>
    </div>
<script>
    let currentLeaderboardView = 'overall'; // Can be 'overall' or 'weekly'
    function switchLeaderboard(view) {
        currentLeaderboardView = view;
        renderHome(); // Instantly redraws the screen when clicked
    }
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA Setup Successful!'))
                .catch(err => console.log('PWA Setup Failed: ', err));
        });
    }

    // 🔴 PASTE YOUR EXACT GOOGLE SCRIPT URL HERE:
        const API_URL = "https://script.google.com/macros/s/AKfycbwB5Aj9JEUqSBdSEKGhIyWmICp4cWJkfF8TV28Q_2cWHoSSYqVKrMVm_GTz584k_kAsyg/exec"; 
    
    
    let appData = { teams: [], players: [], leaderboard: [] };
    let currentTeam = "";
    let selectedNames = [];
    let currentTeamPlayers = [];

    // The schedule to check for the "Playing Today" green dot

    // --- DYNAMIC "PLAYING TODAY" CHECK ---
                // We use appData.schedule instead of the hardcoded matchSchedule
    const liveSchedule = appData.schedule || []; 
                
    isPlayingToday = liveSchedule.some(m => 
    m.date && m.date.includes(todayDateString) && (m.home === actualIplTeam || m.away === actualIplTeam)
    );
    async function init() {
        try {
            const res = await fetch(API_URL);
            appData = await res.json();
            
            if (appData.error) {
                document.getElementById('team-list').innerHTML = `<div class="error-box"><b>Sheet Error:</b> ${appData.error}</div>`;
                return;
            }

            // 🔴 ADD THIS ONE LINE 🔴

            renderHome();
        } catch (err) {
            document.getElementById('team-list').innerHTML = `<div class="error-box"><b>Connection Failed...</b></div>`;
        }
    }
    function renderHome() {
        // 1. ULTRA-COMPACT PREDICTION CHART
        if (appData.leaderboard && appData.leaderboard.length > 0) {
            const maxWins = Math.max(...appData.leaderboard.map(x => x.wins)) || 1;
            document.getElementById('prediction-container').innerHTML = `
                <div style="background: var(--card); padding: 8px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #334155;">
                    <div style="font-size: 0.75rem; color: #94a3b8; margin-bottom: 6px; text-align: center; font-weight: bold;">🏆 PREDICTIONS</div>
                    ${appData.leaderboard.map(f => {
                        const width = (f.wins / maxWins) * 100;
                        return `
                            <div style="display: flex; align-items: center; margin-bottom: 4px; height: 12px;">
                                <div style="width: 50px; font-size: 0.7rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis;">${f.name}</div>
                                <div style="flex: 1; background: #0f172a; height: 8px; border-radius: 4px; margin: 0 5px;">
                                    <div style="width: ${width}%; height: 100%; background: linear-gradient(90deg, #38bdf8, #10b981); border-radius: 4px;"></div>
                                </div>
                                <div style="width: 20px; font-size: 0.75rem; font-weight: bold; color: var(--accent); text-align: right;">${f.wins}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // 2. TOGGLE BUTTONS
        document.getElementById('toggle-container').innerHTML = `
            <div class="toggle-container">
                <div class="toggle-btn ${currentLeaderboardView === 'overall' ? 'active' : ''}" onclick="switchLeaderboard('overall')">Overall Season</div>
                <div class="toggle-btn ${currentLeaderboardView === 'weekly' ? 'active' : ''}" onclick="switchLeaderboard('weekly')">This Week</div>
            </div>
        `;

        // 3. 1-COLUMN VERTICAL TEAM LIST (with logos)
        const sortedTeams = [...appData.teams].sort((a, b) => {
            if (currentLeaderboardView === 'weekly') {
                return parseFloat(b.Week_Score || b.Weekscore || 0) - parseFloat(a.Week_Score || a.Weekscore || 0);
            } else {
                return parseFloat(b.Total_Score || b.Totalscore || b.Score || 0) - parseFloat(a.Total_Score || a.Totalscore || a.Score || 0); 
            }
        });

        document.getElementById('team-list').innerHTML = sortedTeams.map((t, index) => {
            const name = t.Team_Name || t.Teamname || t.Team || "Unknown";
            const score = currentLeaderboardView === 'weekly' ? (parseFloat(t.Week_Score || t.Weekscore) || 0) : (parseFloat(t.Total_Score || t.Totalscore || t.Score) || 0);
            const logo = t.Logo_URL || t.Logourl || "";
            
            let cardStyle = "";
            if (index === 0) {
                cardStyle = currentLeaderboardView === 'weekly' 
                    ? "border: 1px solid #10b981; background: #022c22;" 
                    : "border: 1px solid #fbbf24; background: #382504;";
            }

            return `
                <div class="team-card" style="${cardStyle}" onclick="openSelection('${name}')">
                    <div style="display: flex; align-items: center; flex: 1;">
                        <img src="${logo}" class="logo" onerror="this.style.display='none'">
                        <div style="font-size: 0.9rem; font-weight: bold; color: #f8fafc;">${index === 0 ? '👑 ' : ''}${name}</div>
                    </div>
                    <div style="font-size: 0.95rem; font-weight: bold; ${index === 0 ? (currentLeaderboardView === 'weekly' ? 'color:#10b981;' : 'color:#fbbf24;') : 'color: var(--accent);'}">${Math.round(score)} pts</div>
                </div>`;
        }).join('');
    }
    function openSelection(teamName) {
        currentTeam = teamName.trim();
        const cleanTarget = currentTeam.toLowerCase().replace(/\s/g, '');
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('selection-page').style.display = 'block';
        window.scrollTo(0,0);
        
        const teamPlayers = appData.players.filter(p => {
            const pTeam = (p.Team || p.Team_Name || p.Teamname || "").toString().toLowerCase().replace(/\s/g, '');
            return pTeam === cleanTarget;
        });

        currentTeamPlayers = teamPlayers;

        selectedNames = teamPlayers.filter(p => {
            const s = p.Playing || p.Playing_XI || p.Status || "";
            return s === true || s === "TRUE" || s === "true" || s === 1;
        }).map(p => Object.values(p)[0]); 

        renderPlayers(teamPlayers);
        updateStats(teamPlayers);
    }

   function renderPlayers(players) {
        const sortedPlayers = [...players].sort((a, b) => {
            const nameA = Object.values(a)[0];
            const nameB = Object.values(b)[0];
            const isASelected = selectedNames.includes(nameA);
            const isBSelected = selectedNames.includes(nameB);
            
            if (isASelected && !isBSelected) return -1;
            if (!isASelected && isBSelected) return 1;
            
            const ptsA = parseFloat(Object.values(a)[1]) || 0;
            const ptsB = parseFloat(Object.values(b)[1]) || 0;
            return ptsB - ptsA; 
        });

        document.getElementById('player-pool').innerHTML = sortedPlayers.map(p => {
            try {
                const vals = Object.values(p);
                const fullName = vals[0] || "Unknown";
                
                let rawPts = parseFloat(vals[1]);
                const pts = isNaN(rawPts) ? "0.0" : rawPts.toFixed(1); 
                
                const role = vals[3] || "BT";
                const isFrgn = role.toLowerCase().includes('f');
                const isChecked = selectedNames.includes(fullName);
                
                // --- CRASH-PROOF TEAM GRABBER ---
                const actualIplTeam = String(p.IPL_Team || p.Franchise || p.IPL || p.Team || vals[4] || "").trim().toUpperCase();
                
                // --- DYNAMIC SCHEDULE CHECK ---
                // Safely falls back to an empty array if schedule data is missing
                const liveSchedule = appData.schedule || []; 
                let isPlayingToday = false;
                
                // Get today's real date
                const todayObj = new Date();
                const dd = String(todayObj.getDate()).padStart(2, '0');
                const mm = String(todayObj.getMonth() + 1).padStart(2, '0');
                const yyyy = todayObj.getFullYear();
                const todayDateString = `${dd}/${mm}/${yyyy}`; 

                isPlayingToday = liveSchedule.some(m => 
                    m.date && m.date.includes(todayDateString) && (m.home === actualIplTeam || m.away === actualIplTeam)
                );
                
                const dotHtml = isPlayingToday ? `<span class="playing-today-dot" title="Playing Today!"></span>` : ``;

                const rowStyle = isChecked ? "background: rgba(56, 189, 248, 0.15); border-color: var(--accent);" : "";
                const badgeStyle = isFrgn ? "background: #ef4444; color: white;" : "background: #334155; color: #94a3b8;";

                return `
                    <div class="player-row" style="${rowStyle}">
                        <input type="checkbox" style="transform: scale(1.1); flex-shrink: 0; margin: 0;" 
                            ${isChecked ? 'checked' : ''} 
                            onchange="togglePlayer('${fullName}', ${JSON.stringify(players).replace(/"/g, '&quot;')})">
                        
                        <span class="player-name" title="${fullName}">${dotHtml}${fullName}</span>
                        
                        <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
                            <span class="role-badge" style="${badgeStyle}">${role}</span>
                            <span class="pts-val">${pts}</span>
                        </div>
                    </div>`;
            } catch (err) {
                console.error("Skipped a player due to data error", err);
                return "";
            }
        }).join('');
    }
    function togglePlayer(name, players) {
        if (selectedNames.includes(name)) {
            selectedNames = selectedNames.filter(n => n !== name);
        } else {
            if (selectedNames.length >= 11) return alert("Squad limit reached! (11/11)");
            selectedNames.push(name);
        }
        updateStats(players);
    }

    function autoSelectSquad() {
        selectedNames = []; 
        let frgnCount = 0;
        
        const sortedByPoints = [...currentTeamPlayers].sort((a, b) => {
            const ptsA = parseFloat(Object.values(a)[1]) || 0;
            const ptsB = parseFloat(Object.values(b)[1]) || 0;
            return ptsB - ptsA;
        });

        for (let i = 0; i < sortedByPoints.length; i++) {
            if (selectedNames.length >= 11) break; 

            const p = sortedByPoints[i];
            const name = Object.values(p)[0];
            const role = (Object.values(p)[3] || "").toString().toLowerCase();
            const isFrgn = role.includes('f');

            if (isFrgn && frgnCount >= 4) continue; 

            selectedNames.push(name);
            if (isFrgn) frgnCount++;
        }

        renderPlayers(currentTeamPlayers);
        updateStats(currentTeamPlayers);
        
        const currentOvers = parseInt(document.getElementById('overs').innerText);
        if (currentOvers < 20) {
            alert("Auto-picked! Note: You only have " + currentOvers + " overs. Please adjust manually.");
        }
    }

   function updateStats(players) {
        let overs = 0, frgn = 0, todayCount = 0;
        
        // Grab the live schedule and today's date
        const liveSchedule = appData.schedule || []; 
        const todayObj = new Date();
        const dd = String(todayObj.getDate()).padStart(2, '0');
        const mm = String(todayObj.getMonth() + 1).padStart(2, '0');
        const yyyy = todayObj.getFullYear();
        const todayDateString = `${dd}/${mm}/${yyyy}`;

        // 1. NEW: Count how many players in the ENTIRE squad are playing today
        players.forEach(p => {
            const actualIplTeam = String(p.IPL_Team || p.Franchise || p.IPL || p.Team || Object.values(p)[4] || "").trim().toUpperCase();
            const isPlayingToday = liveSchedule.some(m => 
                m.date && m.date.includes(todayDateString) && (m.home === actualIplTeam || m.away === actualIplTeam)
            );
            if (isPlayingToday) todayCount++;
        });

        // 2. Calculate Overs and Foreigners from ONLY the checked players
        const selectedObj = players.filter(p => selectedNames.includes(Object.values(p)[0]));
        selectedObj.forEach(p => {
            const role = (Object.values(p)[3] || "").toString().toLowerCase();
            if(role.includes('f')) frgn++;
            if(role.includes('bl')) overs += 4;
            else { let m = role.match(/a(\d+)/); if(m) overs += parseInt(m[1]); }
        });

        // Update the screen
        document.getElementById('count').innerText = selectedNames.length;
        document.getElementById('frgn').innerText = frgn;
        document.getElementById('overs').innerText = overs;
        document.getElementById('today-count').innerText = todayCount;
        
        // Colors for warnings / highlights
        document.getElementById('frgn').style.color = frgn > 4 ? "red" : "var(--accent)";
        document.getElementById('overs').style.color = overs < 20 ? "orange" : "var(--accent)";
        document.getElementById('today-count').style.color = todayCount > 0 ? "#10b981" : "var(--accent)"; 
    }

    async function saveSelection(btn) {
        const frgn = parseInt(document.getElementById('frgn').innerText);
        const overs = parseInt(document.getElementById('overs').innerText);
        if (selectedNames.length !== 11) return alert("Select exactly 11 players.");
        if (frgn > 4) return alert("Maximum 4 foreigners allowed.");
        if (overs < 20) return alert("Minimum 20 overs required.");

        btn.innerText = "SAVING..."; 
        btn.disabled = true; 
        btn.style.background = "#94a3b8";

        try {
            await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ teamName: currentTeam, selectedPlayers: selectedNames }) 
            });
            
            const cleanTarget = currentTeam.toLowerCase().replace(/\s/g, '');
            appData.players.forEach(p => {
                const pTeam = (p.Team || p.Team_Name || p.Teamname || "").toString().toLowerCase().replace(/\s/g, '');
                if (pTeam === cleanTarget) {
                    const pName = Object.values(p)[0];
                    const isPlaying = selectedNames.includes(pName);
                    p.Playing = isPlaying;
                    p.Playing_XI = isPlaying;
                    p.Status = isPlaying;
                }
            });

            alert("Saved Successfully!"); 
            closeSelection(); 
            
            btn.innerText = "SAVE PLAYING XI"; 
            btn.disabled = false; 
            btn.style.background = "var(--accent)";

        } catch (e) {
            alert("Error: " + e.message); 
            btn.innerText = "SAVE PLAYING XI"; 
            btn.disabled = false; 
            btn.style.background = "var(--accent)";
        }
    }

    function closeSelection() {
        document.getElementById('selection-page').style.display = 'none';
        document.getElementById('home-page').style.display = 'block';
        window.scrollTo(0, 0);
    }

    async function triggerScraper(btn) {
        btn.innerText = "⏳ STARTING..."; btn.disabled = true; btn.style.background = "#94a3b8";
        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "runScraper" }) });
            alert("Scraper started! Wait ~2 mins then refresh.");
        } catch (e) {
            alert("Failed to start.");
        }
        btn.innerText = "🔄 REFRESH LIVE POINTS"; btn.disabled = false; btn.style.background = "#10b981";
    }

    init();
</script>
</body>
</html>
