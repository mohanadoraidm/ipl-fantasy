<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Fantasy League</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--accent); margin: 0; font-size: 1.5rem; text-transform: uppercase; }
        
        /* Leaderboard Styling */
        .card { background: var(--card); padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; align-items: center; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border-left: 4px solid transparent; transition: 0.3s; }
        .card.top-3 { border-left-color: #fbbf24; }
        .rank { font-weight: bold; font-size: 1.2rem; width: 30px; opacity: 0.5; }
        .info { flex-grow: 1; }
        .name { font-weight: 600; font-size: 1.1rem; }
        .points { font-weight: bold; color: var(--accent); font-size: 1.2rem; }
        
        /* Refresh Button */
        #refresh-btn { background: var(--accent); color: var(--bg); border: none; padding: 12px 24px; border-radius: 30px; font-weight: bold; cursor: pointer; display: block; margin: 20px auto; width: 100%; transition: 0.2s; }
        #refresh-btn:active { transform: scale(0.95); }
        .loading { text-align: center; opacity: 0.6; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Friends IPL League</h1>
        <p>Live Impact Points Standings</p>
    </header>

    <div id="leaderboard">
        <p class="loading">Fetching latest scores...</p>
    </div>

    <button id="refresh-btn" onclick="fetchData()">Refresh Leaderboard</button>
</div>

<script>
    // PASTE YOUR GOOGLE APPS SCRIPT URL HERE
    const API_URL = "https://script.google.com/macros/s/AKfycby61ZZEKhhJgp1ICDeGN6LdlT0_JiQr5o8kZhUSXoysqVPczxrOjbzVr-2Ltte7uRqt0g/exec";

    async function fetchData() {
        const list = document.getElementById('leaderboard');
        const btn = document.getElementById('refresh-btn');
        
        btn.innerText = "Updating...";
        
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            // Sort data: Highest points first
            data.sort((a, b) => b.Total_Points - a.Total_Points); 

            list.innerHTML = ""; // Clear current list
            
            data.forEach((friend, index) => {
                const isTop = index < 3 ? 'top-3' : '';
                list.innerHTML += `
                    <div class="card ${isTop}">
                        <div class="rank">#${index + 1}</div>
                        <div class="info">
                            <div class="name">${friend.Friend_Name}</div>
                        </div>
                        <div class="points">${Math.round(friend.Total_Points)}</div>
                    </div>
                `;
            });
        } catch (error) {
            list.innerHTML = "<p>Error loading data. Check your API URL.</p>";
        } finally {
            btn.innerText = "Refresh Leaderboard";
        }
    }

    // Load data automatically when page opens
    fetchData();
</script>

</body>
</html>
