<script>
    const API_URL = "PASTE_YOUR_WEB_APP_URL_HERE"; 
    let appData = { teams: [], players: [] };

    async function init() {
        const statusDiv = document.getElementById('team-list');
        try {
            statusDiv.innerHTML = "Connecting to Google...";
            const res = await fetch(API_URL);
            appData = await res.json();
            
            // DIAGNOSTIC LOG: This will show in your browser console (F12)
            console.log("Teams Found:", appData.teams.length);
            console.log("Players Found:", appData.players.length);
            
            if (appData.players.length === 0) {
                statusDiv.innerHTML = "<b style='color:red'>ERROR: No players found in Sheet2!</b><br>Check if the tab name is exactly 'Sheet2'.";
                return;
            }

            renderHome();
        } catch (err) {
            statusDiv.innerHTML = "Connection Failed: " + err.message;
        }
    }

    function renderHome() {
        const list = document.getElementById('team-list');
        list.innerHTML = appData.teams.map(t => {
            // Find the Name and Score regardless of capitalization
            const name = t.Team_Name || t.Teamname || t.teamname || "Unknown";
            const score = t.Total_Score || t.totalscore || 0;
            const logo = t.Logo_URL || t.logourl || "";

            return `
                <div class="team-card" onclick="openSelection('${name}')">
                    <img src="${logo}" class="logo" onerror="this.src='https://via.placeholder.com/50'">
                    <div><b>${name}</b></div>
                    <div class="points">${Math.round(score)} pts</div>
                </div>
            `;
        }).join('');
    }

    function openSelection(teamName) {
        const cleanTarget = teamName.trim().toLowerCase();
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('selection-page').style.display = 'block';
        
        // Let's see what the first player's team looks like for debugging
        if(appData.players.length > 0) {
            console.log("Sample Player Team Data:", appData.players[0]);
        }

        const teamPlayers = appData.players.filter(p => {
            // Check all possible "Team" column headers
            const pTeam = (p.Team || p.team || p.teamname || "").toString().trim().toLowerCase();
            return pTeam === cleanTarget;
        });

        if (teamPlayers.length === 0) {
            const sample = appData.players[0] ? JSON.stringify(appData.players[0]) : "None";
            document.getElementById('player-pool').innerHTML = `
                <div style="padding:20px; color:#f87171">
                    <h3>No players found for ${teamName}</h3>
                    <p>The website is looking for "${cleanTarget}"</p>
                    <p><b>Diagnostic:</b> The first player in your sheet has Team = "${appData.players[0].Team || appData.players[0].team || 'Unknown'}"</p>
                </div>`;
            return;
        }

        // Identify existing selections
        selectedNames = teamPlayers.filter(p => {
            const s = p.Playing_XI || p.playingxi || p.Status || "";
            return s === true || s === "TRUE" || s === "Playing";
        }).map(p => p.Player_Name || p.Playername || p.playername || p.name);

        renderPlayers(teamPlayers);
        updateStats();
    }

    function renderPlayers(players) {
        document.getElementById('player-pool').innerHTML = players.map(p => {
            const name = p.Player_Name || p.Playername || p.playername || p.name;
            const pts = p.Impact_Points || p.impactpoints || p.points || 0;
            const role = p.Role || p.role || "BT";
            return `
                <div class="player-row">
                    <input type="checkbox" ${selectedNames.includes(name) ? 'checked' : ''} onchange="togglePlayer('${name}')">
                    <span style="margin-left:10px">${name}</span>
                    <span class="role-badge">${role}</span>
                    <span style="margin-left:auto">${pts}</span>
                </div>
            `;
        }).join('');
    }

    // ... (keep the togglePlayer, updateStats, and saveSelection functions)
    init();
</script>
