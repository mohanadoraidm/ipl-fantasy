<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Fantasy 2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-status-bar" content="#0f172a">
    <style>
        
        * {
            box-sizing: border-box;
            max-width: 100%;
        }
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --danger: #ef4444; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid #334155; margin-bottom: 20px; }
        .team-card { background: var(--card); display: flex; align-items: center; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .team-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .logo { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #334155; object-fit: contain; }
        .points { margin-left: auto; font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        #selection-page { display: none; }
        .stats-bar { position: sticky; top: 0; background: var(--bg); padding: 15px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-around; font-size: 0.85rem; z-index: 10; }
        .stats-bar b { color: var(--accent); }
        .player-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #334155; background: #1e293b50; }
        .role-badge { font-size: 0.7rem; background: #334155; padding: 3px 8px; border-radius: 4px; margin-left: 10px; text-transform: uppercase; }
        .btn { background: var(--accent); color: #0f172a; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 1rem; }
        .btn-secondary { background: #475569; margin-top: 10px; color: white; }
        .btn-refresh { background:#10b981; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold; width: 100%; margin-bottom: 20px;}
        .error-box { background: #fee2e2; color: #991b1b; padding: 20px; border-radius: 8px; margin: 10px 0; font-family: monospace; }
        /* COMPACT GRID LAYOUT FOR PLAYERS */
       /* UPDATED: SINGLE COLUMN LAYOUT FOR FULL NAMES */
        /* ========================================= */
        /* ULTRA-COMPACT 25-PLAYER LAYOUT            */
        /* ========================================= */
        #player-pool {
            display: flex;
            flex-direction: column;
            gap: 2px; /* Micro-gap to save vertical space */
            padding: 5px 0;
            width: 100%;
        }
        
        .player-row { 
            display: flex; 
            align-items: center; 
            padding: 4px 8px; /* Slashed padding for tight rows */
            background: #1e293b; 
            border: 1px solid #334155;
            border-radius: 4px; /* Sharper corners save space */
            font-size: 0.8rem; 
            height: 32px; /* Fixed height forces it to fit screen */
        }

        .player-name {
            margin-left: 8px;
            font-weight: 600;
            color: #f8fafc;
            white-space: nowrap; /* Forces name to stay on ONE line (No two rows) */
            overflow: hidden; 
            text-overflow: ellipsis; /* Adds ... ONLY if the screen is unimaginably small */
            flex: 1; /* Pushes the points to the far right */
            font-size: 0.8rem; /* Shrunk to fit long names */
        }

        .role-badge {
            font-size: 0.6rem; /* Micro badge */
            padding: 2px 4px;
            margin-left: 5px;
        }

        .pts-val {
            margin-left: 8px;
            font-weight: bold;
            color: #ffb7b2; 
            font-size: 0.85rem; /* Shrunk to match new layout */
        }

        .auto-box {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid var(--accent);
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playing-today-dot {
            height: 8px; 
            width: 8px; 
            background-color: #10b981; 
            border-radius: 50%; 
            box-shadow: 0 0 8px #10b981; 
            display: inline-block; 
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .toggle-container {
            display: flex;
            background: #1e293b;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .toggle-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            color: #94a3b8;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
        }
        .toggle-btn.active {
            background: var(--accent);
            color: #0f172a;
        }
    </style>
</head>
<body>

    <div id="home-page">
        <div class="header">
            <h1>IPL Leaderboard 2026</h1>
            <p style="color: #94a3b8;">Select a team to manage squad</p>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn-refresh" style="margin-bottom: 0;" onclick="triggerScraper(this)">
                    🔄 REFRESH POINTS
                </button>
                
            </div>
        </div>
        
        <div id="team-list">
            <div style="text-align: center; padding: 50px;">Connecting to Google Sheets...</div>
        </div>
    </div>

    <div id="selection-page">
        <div class="stats-bar">
            <span>Selected: <b id="count">0</b>/11</span>
            <span>Foreign: <b id="frgn">0</b>/4</span>
            <span>Overs: <b id="overs">0</b>/20</span>
        </div>
        
        <div class="auto-box">
            <div>
                <b style="font-size: 1.1rem; color: var(--accent);">⚡ Auto Best Squad</b>
                <div style="font-size: 0.8rem; color: #94a3b8; margin-top: 4px;">Picks highest scoring XI (Max 4 Foreigners)</div>
            </div>
            <button class="btn" style="margin: 0; width: auto; padding: 10px 20px; background: #10b981; color: white;" onclick="autoSelectSquad()">AUTO PICK</button>
        </div>

        <div id="player-pool"></div>
        <button class="btn" onclick="saveSelection(this)">SAVE PLAYING XI</button>
        <button class="btn btn-secondary" onclick="closeSelection()">CANCEL / BACK</button>
    </div>

    <div id="prediction-page" style="display: none;">
        <div class="header">
            <h1>Match Predictions</h1>
            
            <select id="user-selector" onchange="renderMatches()" style="background:#1e293b; color:white; border:1px solid var(--accent); padding:10px; border-radius:8px; width:100%; max-width:300px; font-size:1.1rem; margin-top:10px; text-align:center;">
                <option value="Mohan">Playing as: Mohan</option>
                <option value="Hemanth">Playing as: Hemanth</option>
                <option value="Adhith">Playing as: Adhith</option>
                <option value="Muthu">Playing as: Muthu</option>
                <option value="Saran">Playing as: Saran</option>
            </select>
        </div>

        <div id="dynamic-matches-container"></div>

        <button class="btn btn-secondary" onclick="document.getElementById('prediction-page').style.display='none'; document.getElementById('home-page').style.display='block';">BACK TO HOME</button>
    </div>

<script>
    let currentLeaderboardView = 'overall'; // Can be 'overall' or 'weekly'
    function switchLeaderboard(view) {
        currentLeaderboardView = view;
        renderHome(); // Instantly redraws the screen when clicked
    }
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('PWA Setup Successful!'))
                .catch(err => console.log('PWA Setup Failed: ', err));
        });
    }

    // 🔴 PASTE YOUR EXACT GOOGLE SCRIPT URL HERE:
    const API_URL = "https://script.google.com/macros/s/AKfycbzAjPcHzGiK0AZIh4CRBYps4OkcLOS6GnPnrhTE-UQhacnpi7Gy3zML67kJNaj0ASnGew/exec"; 
    
    let appData = { teams: [], players: [], leaderboard: [] };
    let currentTeam = "";
    let selectedNames = [];
    let currentTeamPlayers = [];

    // The schedule to check for the "Playing Today" green dot
    const matchSchedule = [
        { date: "09/04/2026", home: "KKR", away: "LSG" },
        { date: "10/04/2026", home: "RR", away: "RCB" },
        { date: "11/04/2026", home: "PBKS", away: "SRH" },
        { date: "11/04/2026", home: "CSK", away: "DC" }
    ];

    async function init() {
        try {
            const res = await fetch(API_URL);
            appData = await res.json();
            
            if (appData.error) {
                document.getElementById('team-list').innerHTML = `<div class="error-box"><b>Sheet Error:</b> ${appData.error}</div>`;
                return;
            }
            renderHome();
        } catch (err) {
            document.getElementById('team-list').innerHTML = `<div class="error-box"><b>Connection Failed:</b> Make sure you copied the correct Web App URL and deployed as "Anyone".</div>`;
        }
    }

    function renderHome() {
        let predictionHtml = "";
        
        // 1. YOUR EXISTING PREDICTION GRAPH
        if (appData.leaderboard && appData.leaderboard.length > 0) {
            const maxWins = Math.max(...appData.leaderboard.map(x => x.wins)) || 1;
            predictionHtml = `
                <div style="background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #334155;">
                    <h3 style="margin: 0 0 15px 0; font-size: 1rem; color: #94a3b8;">🏆 Prediction Standings</h3>
                    <div id="chart-content">
                        ${appData.leaderboard.map(f => {
                            const width = (f.wins / maxWins) * 100;
                            return `
                                <div style="display: flex; align-items: center; margin-bottom: 8px;">
                                    <div style="width: 75px; font-size: 0.8rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${f.name}</div>
                                    <div style="flex: 1; background: #0f172a; height: 12px; border-radius: 6px; margin: 0 10px; overflow: hidden;">
                                        <div style="width: ${width}%; height: 100%; background: linear-gradient(90deg, #38bdf8, #10b981); border-radius: 6px;"></div>
                                    </div>
                                    <div style="width: 25px; font-size: 0.85rem; font-weight: bold; color: var(--accent); text-align: right;">${f.wins}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        // 2. THE NEW TOGGLE UI
        let toggleHtml = `
            <div class="toggle-container">
                <div class="toggle-btn ${currentLeaderboardView === 'overall' ? 'active' : ''}" 
                     onclick="switchLeaderboard('overall')">Overall Season</div>
                <div class="toggle-btn ${currentLeaderboardView === 'weekly' ? 'active' : ''}" 
                     onclick="switchLeaderboard('weekly')">This Week</div>
            </div>
        `;

        // 3. SMART SORTING (Weekly vs Overall)
        const sortedTeams = [...appData.teams].sort((a, b) => {
            if (currentLeaderboardView === 'weekly') {
                const scoreA = parseFloat(a.Week_Score || a.Weekscore || a.WeekScore || 0);
                const scoreB = parseFloat(b.Week_Score || b.Weekscore || b.WeekScore || 0);
                return scoreB - scoreA;
            } else {
                const scoreA = parseFloat(a.Total_Score || a.Totalscore || a.Score || 0);
                const scoreB = parseFloat(b.Total_Score || b.Totalscore || b.Score || 0);
                return scoreB - scoreA; 
            }
        });

        // 4. DRAWING THE TEAM CARDS
        const teamsHtml = sortedTeams.map((t, index) => {
            const name = t.Team_Name || t.Teamname || t.Team || "Unknown";
            
            // Pick the right score to show
            const score = currentLeaderboardView === 'weekly' 
                ? (parseFloat(t.Week_Score || t.Weekscore || t.WeekScore) || 0) 
                : (parseFloat(t.Total_Score || t.Totalscore || t.Score) || 0);
                
            const logo = t.Logo_URL || t.Logourl || "";
            
            let cardStyle = "";
            let badge = "";
            
            if (index === 0) {
                if (currentLeaderboardView === 'weekly') {
                    // Manager of the Week Styling
                    cardStyle = "border: 2px solid #10b981; background: linear-gradient(145deg, #1e293b, #022c22);";
                    badge = `<div style="font-size: 0.7rem; background: #10b981; color: white; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; display: inline-block;">⭐ MANAGER OF THE WEEK</div><br>`;
                } else {
                    // Overall Leader Styling
                    cardStyle = "border: 2px solid #fbbf24; background: linear-gradient(145deg, #1e293b, #382504);";
                    badge = `<span style="font-size: 1.5rem; margin-right: 10px; filter: drop-shadow(0 0 5px gold);">👑</span>`;
                }
            }

            return `
                <div class="team-card" style="${cardStyle}" onclick="openSelection('${name}')">
                    <img src="${logo}" class="logo" onerror="this.style.display='none'">
                    <div style="flex: 1;">
                        ${badge}
                        <b style="font-size: 1.1rem;">${name}</b>
                    </div>
                    <div class="points" style="${index === 0 && currentLeaderboardView === 'overall' ? 'color: #fbbf24;' : ''}
                                               ${index === 0 && currentLeaderboardView === 'weekly' ? 'color: #10b981;' : ''}">
                        ${Math.round(score)} pts
                    </div>
                </div>`;
        }).join('');

        // Combine Prediction Graph + Toggle + Teams
        document.getElementById('team-list').innerHTML = predictionHtml + toggleHtml + teamsHtml;
    }
    function openSelection(teamName) {
        currentTeam = teamName.trim();
        const cleanTarget = currentTeam.toLowerCase().replace(/\s/g, '');
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('selection-page').style.display = 'block';
        window.scrollTo(0,0);
        
        const teamPlayers = appData.players.filter(p => {
            const pTeam = (p.Team || p.Team_Name || p.Teamname || "").toString().toLowerCase().replace(/\s/g, '');
            return pTeam === cleanTarget;
        });

        currentTeamPlayers = teamPlayers;

        selectedNames = teamPlayers.filter(p => {
            const s = p.Playing || p.Playing_XI || p.Status || "";
            return s === true || s === "TRUE" || s === "true" || s === 1;
        }).map(p => Object.values(p)[0]); 

        renderPlayers(teamPlayers);
        updateStats(teamPlayers);
    }

   function renderPlayers(players) {
        const sortedPlayers = [...players].sort((a, b) => {
            const nameA = Object.values(a)[0];
            const nameB = Object.values(b)[0];
            const isASelected = selectedNames.includes(nameA);
            const isBSelected = selectedNames.includes(nameB);
            
            if (isASelected && !isBSelected) return -1;
            if (!isASelected && isBSelected) return 1;
            
            const ptsA = parseFloat(Object.values(a)[1]) || 0;
            const ptsB = parseFloat(Object.values(b)[1]) || 0;
            return ptsB - ptsA; 
        });

        document.getElementById('player-pool').innerHTML = sortedPlayers.map(p => {
            try {
                const vals = Object.values(p);
                const fullName = vals[0] || "Unknown";
                
                let rawPts = parseFloat(vals[1]);
                const pts = isNaN(rawPts) ? "0.0" : rawPts.toFixed(1); 
                
                const role = vals[3] || "BT";
                const isFrgn = role.toLowerCase().includes('f');
                const isChecked = selectedNames.includes(fullName);
                
                // --- CRASH-PROOF TEAM GRABBER ---
                // String() safely converts missing data to "" without crashing
                // We check a few common column names here.
                const actualIplTeam = String(p.IPL_Team || p.Franchise || p.IPL || p.Team || vals[4] || "").trim().toUpperCase();
                
                let isPlayingToday = false;
                
                // Get today's real date
                const todayObj = new Date();
                const dd = String(todayObj.getDate()).padStart(2, '0');
                const mm = String(todayObj.getMonth() + 1).padStart(2, '0');
                const yyyy = todayObj.getFullYear();
                const todayDateString = `${dd}/${mm}/${yyyy}`; 

                isPlayingToday = matchSchedule.some(m => 
                    m.date && m.date.includes(todayDateString) && (m.home === actualIplTeam || m.away === actualIplTeam)
                );
                
                const dotHtml = isPlayingToday ? `<span class="playing-today-dot" title="Playing Today!"></span>` : ``;

                const rowStyle = isChecked ? "background: rgba(56, 189, 248, 0.15); border-color: var(--accent);" : "";
                const badgeStyle = isFrgn ? "background: #ef4444; color: white;" : "background: #334155; color: #94a3b8;";

                return `
                    <div class="player-row" style="${rowStyle}">
                        <input type="checkbox" style="transform: scale(1.1); flex-shrink: 0; margin: 0;" 
                            ${isChecked ? 'checked' : ''} 
                            onchange="togglePlayer('${fullName}', ${JSON.stringify(players).replace(/"/g, '&quot;')})">
                        
                        <span class="player-name" title="${fullName}">${dotHtml}${fullName}</span>
                        
                        <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
                            <span class="role-badge" style="${badgeStyle}">${role}</span>
                            <span class="pts-val">${pts}</span>
                        </div>
                    </div>`;
            } catch (err) {
                // If one single player has corrupted data, skip them, but draw the rest of the team!
                console.error("Skipped a player due to data error", err);
                return "";
            }
        }).join('');
    }

    function togglePlayer(name, players) {
        if (selectedNames.includes(name)) {
            selectedNames = selectedNames.filter(n => n !== name);
        } else {
            if (selectedNames.length >= 11) return alert("Squad limit reached! (11/11)");
            selectedNames.push(name);
        }
        updateStats(players);
    }

    function autoSelectSquad() {
        selectedNames = []; 
        let frgnCount = 0;
        
        const sortedByPoints = [...currentTeamPlayers].sort((a, b) => {
            const ptsA = parseFloat(Object.values(a)[1]) || 0;
            const ptsB = parseFloat(Object.values(b)[1]) || 0;
            return ptsB - ptsA;
        });

        for (let i = 0; i < sortedByPoints.length; i++) {
            if (selectedNames.length >= 11) break; 

            const p = sortedByPoints[i];
            const name = Object.values(p)[0];
            const role = (Object.values(p)[3] || "").toString().toLowerCase();
            const isFrgn = role.includes('f');

            if (isFrgn && frgnCount >= 4) continue; 

            selectedNames.push(name);
            if (isFrgn) frgnCount++;
        }

        renderPlayers(currentTeamPlayers);
        updateStats(currentTeamPlayers);
        
        const currentOvers = parseInt(document.getElementById('overs').innerText);
        if (currentOvers < 20) {
            alert("Auto-picked! Note: You only have " + currentOvers + " overs. Please adjust manually.");
        }
    }

    function updateStats(players) {
        let overs = 0, frgn = 0;
        const selectedObj = players.filter(p => selectedNames.includes(Object.values(p)[0]));
        
        selectedObj.forEach(p => {
            const role = (Object.values(p)[3] || "").toString().toLowerCase();
            if(role.includes('f')) frgn++;
            if(role.includes('bl')) overs += 4;
            else { let m = role.match(/a(\d+)/); if(m) overs += parseInt(m[1]); }
        });

        document.getElementById('count').innerText = selectedNames.length;
        document.getElementById('frgn').innerText = frgn;
        document.getElementById('overs').innerText = overs;
        document.getElementById('frgn').style.color = frgn > 4 ? "red" : "var(--accent)";
        document.getElementById('overs').style.color = overs < 20 ? "orange" : "var(--accent)";
    }

    async function saveSelection(btn) {
        const frgn = parseInt(document.getElementById('frgn').innerText);
        const overs = parseInt(document.getElementById('overs').innerText);
        if (selectedNames.length !== 11) return alert("Select exactly 11 players.");
        if (frgn > 4) return alert("Maximum 4 foreigners allowed.");
        if (overs < 20) return alert("Minimum 20 overs required.");

        btn.innerText = "SAVING..."; 
        btn.disabled = true; 
        btn.style.background = "#94a3b8";

        try {
            await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ teamName: currentTeam, selectedPlayers: selectedNames }) 
            });
            
            const cleanTarget = currentTeam.toLowerCase().replace(/\s/g, '');
            appData.players.forEach(p => {
                const pTeam = (p.Team || p.Team_Name || p.Teamname || "").toString().toLowerCase().replace(/\s/g, '');
                if (pTeam === cleanTarget) {
                    const pName = Object.values(p)[0];
                    const isPlaying = selectedNames.includes(pName);
                    p.Playing = isPlaying;
                    p.Playing_XI = isPlaying;
                    p.Status = isPlaying;
                }
            });

            alert("Saved Successfully!"); 
            closeSelection(); 
            
            btn.innerText = "SAVE PLAYING XI"; 
            btn.disabled = false; 
            btn.style.background = "var(--accent)";

        } catch (e) {
            alert("Error: " + e.message); 
            btn.innerText = "SAVE PLAYING XI"; 
            btn.disabled = false; 
            btn.style.background = "var(--accent)";
        }
    }

    function closeSelection() {
        document.getElementById('selection-page').style.display = 'none';
        document.getElementById('home-page').style.display = 'block';
        window.scrollTo(0, 0);
    }

    async function triggerScraper(btn) {
        btn.innerText = "⏳ STARTING..."; btn.disabled = true; btn.style.background = "#94a3b8";
        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "runScraper" }) });
            alert("Scraper started! Wait ~2 mins then refresh.");
        } catch (e) {
            alert("Failed to start.");
        }
        btn.innerText = "🔄 REFRESH LIVE POINTS"; btn.disabled = false; btn.style.background = "#10b981";
    }

    init();
</script>
</body>
</html>
